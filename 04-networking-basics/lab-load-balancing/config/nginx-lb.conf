events { worker_connections 1024; }

http {
    upstream taskflow_pool {
        least_conn;   # alternatives: default round-robin, ip_hash;
        server taskflow-1:8080 max_fails=2 fail_timeout=10s;
        server taskflow-2:8080 max_fails=2 fail_timeout=10s weight=2;
        server taskflow-3:8080 max_fails=2 fail_timeout=10s;
        # ip_hash;      # sticky sessions by client IP
    }

    server {
        listen 80;

        location /health {
            proxy_pass http://taskflow_pool/health;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }

        location /api/ {
            proxy_pass http://taskflow_pool/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}