upstream taskflow_upstream {
    server taskflow:8080;
}

server {
    listen 443 ssl;
    server_name api.taskflow.local;

    ssl_certificate     /etc/nginx/certs/taskflow.crt;
    ssl_certificate_key /etc/nginx/certs/taskflow.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://taskflow_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}