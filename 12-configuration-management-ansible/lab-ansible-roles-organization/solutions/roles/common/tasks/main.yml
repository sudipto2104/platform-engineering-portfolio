---
- name: Ensure taskflow group exists
  ansible.builtin.group:
    name: taskflow
    state: present

- name: Ensure taskflow user exists
  ansible.builtin.user:
    name: taskflow
    group: taskflow
    system: true
    create_home: false
    shell: /sbin/nologin

- name: Install base packages
  ansible.builtin.yum:
    name: "{{ base_packages }}"
    state: present

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    mode: "0755"