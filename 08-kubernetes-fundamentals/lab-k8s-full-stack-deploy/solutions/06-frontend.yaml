apiVersion: v1
kind: Service
metadata:
  name: taskflow-ui
  namespace: taskflow
spec:
  type: NodePort
  selector:
    app: taskflow-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-ui
  namespace: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow-ui
  template:
    metadata:
      labels:
        app: taskflow-ui
    spec:
      containers:
        - name: ui
          image: taskflow-ui:week7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_HOST
              value: taskflow-api.taskflow.svc.cluster.local
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 5