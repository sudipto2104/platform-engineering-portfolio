apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  service.slack: |
    token: $slack-token
  template.app-deployed: |
    message: |
      TaskFlow app {{.app.metadata.name}} deployed to {{.app.spec.destination.namespace}}
      Sync status: {{.app.status.sync.status}}
      Health: {{.app.status.health.status}}
      Revision: {{.app.status.sync.revision}}
  template.app-degraded: |
    message: |
      ALERT: TaskFlow app {{.app.metadata.name}} is degraded
      Health: {{.app.status.health.status}}
  trigger.on-deployed: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send: [app-deployed]
  trigger.on-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-degraded]
  subscriptions: |
    - recipients:
        - slack:taskflow-platform
      triggers:
        - on-deployed
        - on-degraded
  defaultTriggers.slack: |
    - on-deployed
    - on-degraded