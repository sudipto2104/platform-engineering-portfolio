apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskflow-production

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

patches:
  - target:
      kind: Deployment
      name: taskflow-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: APP_ENV
            value: production
  - target:
      kind: Deployment
      name: taskflow-ui
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3