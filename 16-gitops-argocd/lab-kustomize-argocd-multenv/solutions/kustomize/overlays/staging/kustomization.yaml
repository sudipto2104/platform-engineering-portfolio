apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: taskflow-staging

resources:
  - ../../base

namePrefix: stg-

commonLabels:
  environment: staging

patches:
  - target:
      kind: Deployment
      name: taskflow-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/containers/0/env
        value:
          - name: APP_ENV
            value: staging
  - target:
      kind: Deployment
      name: taskflow-ui
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2