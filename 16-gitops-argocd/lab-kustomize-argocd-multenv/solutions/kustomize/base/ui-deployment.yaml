apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-ui
  template:
    metadata:
      labels:
        app: taskflow-ui
    spec:
      containers:
        - name: ui
          image: taskflow-ui:week7
          ports:
            - containerPort: 80