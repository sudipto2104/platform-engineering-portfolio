# TaskFlow Week 2 web stack — mirrors apt/systemd layout for local practice.
services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8088:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - taskflow
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  taskflow:
    image: taskflow:week2
    build:
      context: ../../01-devops-platform-engineering-overview/taskflow
    environment:
      TASKFLOW_VERSION: week2
      DATABASE_URL: postgresql://taskflow:taskflow@postgres:5432/taskflow
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata: