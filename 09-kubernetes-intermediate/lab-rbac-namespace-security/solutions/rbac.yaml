# Least-privilege: deployer can manage apps in staging only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: taskflow-deployer
  namespace: taskflow-staging
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: taskflow-deployer-binding
  namespace: taskflow-staging
subjects:
  - kind: ServiceAccount
    name: taskflow-deployer
    namespace: taskflow-staging
roleRef:
  kind: Role
  name: taskflow-deployer
  apiGroup: rbac.authorization.k8s.io
---
# Read-only observability in dev
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: taskflow-readonly
  namespace: taskflow-dev
rules:
  - apiGroups: ["", "apps"]
    resources: ["pods", "pods/log", "services", "deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: taskflow-readonly-binding
  namespace: taskflow-dev
subjects:
  - kind: ServiceAccount
    name: taskflow-readonly
    namespace: taskflow-dev
roleRef:
  kind: Role
  name: taskflow-readonly
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole: prod API SA can read ConfigMaps in its namespace only (via Role below)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: taskflow-api-runtime
  namespace: taskflow-prod
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["taskflow-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: taskflow-api-runtime-binding
  namespace: taskflow-prod
subjects:
  - kind: ServiceAccount
    name: taskflow-api
    namespace: taskflow-prod
roleRef:
  kind: Role
  name: taskflow-api-runtime
  apiGroup: rbac.authorization.k8s.io