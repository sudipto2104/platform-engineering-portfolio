name: TaskFlow Quality Gates (Strict)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install ruff black pip-audit
          pip install -r requirements.txt
      - run: ruff check app.py
      - run: black --check app.py
      - name: pip-audit (strict)
        run: pip-audit -r requirements.txt --strict

  javascript-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run format
      - name: npm audit (strict)
        run: npm audit --audit-level=high