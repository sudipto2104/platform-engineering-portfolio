services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow_dev}
    volumes:
      - taskflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [taskflow-net]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - taskflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [taskflow-net]

  backend:
    build:
      context: ../taskflow-stack/backend
      dockerfile: ../../lab-dockerfile-containerization/solutions/Dockerfile.backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql://taskflow:taskflow_dev@postgres:5432/taskflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      TASKFLOW_VERSION: week7-compose
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [taskflow-net]

  frontend:
    build:
      context: ../taskflow-stack/frontend
      dockerfile: ../../lab-dockerfile-containerization/solutions/Dockerfile.frontend
      args:
        VITE_APP_ENV: ${VITE_APP_ENV:-dev}
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_BUILD_ID: week7-compose
    ports:
      - "8080:80"
    depends_on:
      backend: { condition: service_healthy }
    networks: [taskflow-net]

volumes:
  taskflow_pg_data:
  taskflow_redis_data:

networks:
  taskflow-net:
    driver: bridge